name: Update Dashboard

on:
  schedule:
    # 매일 한국시간 09:00 (UTC 00:00) 자동 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행도 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install GitHub CLI
        uses: cli/gh-actions/setup@v2

      - name: Auth GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run build script (fast mode)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_github_repos.py --fast

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "ICBM2 Bot"
          git config user.email "icbm2[bot]@users.noreply.github.com"
          git add dashboard/github-repos.html data/github_repos_cache.json data/github_repos_new.json
          git commit -m "🤖 dashboard: auto-update $(date -u +%Y-%m-%d)"
          git push
