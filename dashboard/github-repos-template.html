<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICBM2 지식 그래프</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 20px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #header h1 {
            font-size: 18px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #94a3b8;
        }
        #stats span {
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 12px;
        }
        #search {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #e2e8f0;
            font-size: 13px;
            width: 200px;
            outline: none;
        }
        #search:focus {
            border-color: #60a5fa;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .node {
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .node circle {
            stroke: rgba(255,255,255,0.2);
            stroke-width: 1.5px;
        }
        .node:hover circle {
            stroke: #fff;
            stroke-width: 3px;
            filter: brightness(1.3);
        }
        .node text {
            font-size: 10px;
            fill: #cbd5e1;
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .node.entity text {
            font-weight: bold;
            font-size: 11px;
        }
        .link {
            stroke: rgba(255,255,255,0.08);
            stroke-width: 1;
        }
        .link.mentions { stroke: rgba(96, 165, 250, 0.15); }
        .link.same_date { stroke: rgba(16, 185, 129, 0.15); stroke-dasharray: 4 2; }
        .link.same_category { stroke: rgba(236, 72, 153, 0.15); stroke-dasharray: 2 2; }
        .link.co_occurrence { stroke: rgba(167, 139, 250, 0.2); stroke-width: 2; }
        
        #tooltip {
            position: fixed;
            padding: 12px 16px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 320px;
            z-index: 200;
        }
        #tooltip .tt-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        #tooltip .tt-meta {
            color: #94a3b8;
            font-size: 11px;
            line-height: 1.6;
        }
        #tooltip .tt-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-bottom: 6px;
        }
        
        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 11px;
            z-index: 100;
        }
        #legend h3 {
            font-size: 12px;
            margin-bottom: 8px;
            color: #94a3b8;
        }
        #legend .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        #legend .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        #controls button {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            color: #e2e8f0;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #controls button:hover {
            background: rgba(30, 41, 59, 0.95);
            border-color: #60a5fa;
        }
        
        .dimmed { opacity: 0.1; }
    </style>
</head>
<body>
    <div id="header">
        <h1>🧠 ICBM2 지식 그래프</h1>
        <div id="stats">
            <span>📊 노드 500개</span>
            <span>🔗 연결 3967개</span>
            <span>📅 2026-04-26</span>
        </div>
        <input type="text" id="search" placeholder="🔍 검색 (예: AI, Swift, 삼성전자...)">
    </div>
    
    <div id="tooltip"></div>
    
    <svg id="graph"></svg>
    
    <div id="legend">
        <h3>📡 데이터 소스</h3>
        <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B"></div>iOS Trend</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4ECDC4"></div>Invest Memo</div>
        <div class="legend-item"><div class="legend-dot" style="background:#A78BFA"></div>AI Model</div>
        <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div>Learning Log</div>
        <div class="legend-item"><div class="legend-dot" style="background:#EC4899"></div>아이디어 노트</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3B82F6"></div>뉴스 클리핑</div>
        <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>주간 리포트</div>
    </div>
    
    <div id="controls">
        <button onclick="resetZoom()">🔄 리셋</button>
        <button onclick="toggleLabels()">🏷️ 라벨</button>
    </div>

    const width = window.innerWidth;
    const height = window.innerHeight;
    
    const svg = d3.select("#graph")

        .attr("height", height);
    
    const g = svg.append("g");
    
    // 줌
    const zoom = d3.zoom()
        .scaleExtent([0.1, 5])
        .on("zoom", (event) => g.attr("transform", event.transform));
    svg.call(zoom);
    
    function resetZoom() {
        svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        d3.selectAll(".node").classed("dimmed", false);
        d3.selectAll(".link").classed("dimmed", false);
    }
    
    // 포스 시뮬레이션
    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(d => d.type === "co_occurrence" ? 120 : 80))
        .force("charge", d3.forceManyBody().strength(-100))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(d => d.size + 5));
    
    // 링크
    const link = g.append("g")
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("class", d => "link " + d.type);
    
    // 노드
    const node = g.append("g")
        .selectAll("g")
        .data(nodes)
        .join("g")
        .attr("class", d => "node" + (d.is_entity ? " entity" : ""))
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));
    
    node.append("circle")
        .attr("r", d => d.size)
        .attr("fill", d => d.color)
        .attr("opacity", d => d.is_entity ? 0.8 : 0.6);
    
    node.append("text")
        .text(d => d.title.length > 15 ? d.title.substring(0, 15) + "…" : d.title)
        .attr("dy", d => d.size + 12);
    
    // 툴팁
    const tooltip = d3.select("#tooltip");
    
    node.on("mouseover", function(event, d) {
        const connections = links.filter(l => l.source.id === d.id || l.target.id === d.id);
        const connectedIds = new Set();
        connections.forEach(l => {
            connectedIds.add(typeof l.source === "object" ? l.source.id : l.source);
            connectedIds.add(typeof l.target === "object" ? l.target.id : l.target);
        });
        
        // 디밍
        node.classed("dimmed", n => !connectedIds.has(n.id) && n.id !== d.id);
        link.classed("dimmed", l => {
            const sId = typeof l.source === "object" ? l.source.id : l.source;
            const tId = typeof l.target === "object" ? l.target.id : l.target;
            return sId !== d.id && tId !== d.id;
        });
        
        let metaHtml = "";
        if (d.date) metaHtml += `📅 {d.date}<br>`;
        if (d.category) metaHtml += `📂 {d.category}<br>`;
        if (d.ticker) metaHtml += `📊 {d.ticker}<br>`;
        if (d.provider) metaHtml += `🏢 {d.provider}<br>`;
        if (d.url) metaHtml += `<a href="{d.url}" target="_blank" style="color:#60a5fa">🔗 링크</a><br>`;
        metaHtml += `🔗 {connections.length}개 연결`;
        
        tooltip.html(`
            <div class="tt-type" style="background:{d.color}33;color:{d.color}">{d.entity_type}</div>
            <div class="tt-title">{d.title}</div>
            <div class="tt-meta">{metaHtml}</div>
        `)
        .style("left", (event.pageX + 15) + "px")
        .style("top", (event.pageY - 10) + "px")
        .style("opacity", 1);
    })
    .on("mouseout", function() {
        tooltip.style("opacity", 0);
        node.classed("dimmed", false);
        link.classed("dimmed", false);
    })
    .on("click", function(event, d) {
        if (d.url) window.open(d.url, "_blank");
    });
    
    // 검색
    const searchInput = document.getElementById("search");
    searchInput.addEventListener("input", function() {
        const query = this.value.toLowerCase();
        if (!query) {
            node.classed("dimmed", false);
            link.classed("dimmed", false);
            return;
        }
        
        const matchedIds = new Set();
        nodes.forEach(n => {
            if (n.title.toLowerCase().includes(query) || 
                n.entity_type.toLowerCase().includes(query) ||
                (n.category && n.category.toLowerCase().includes(query))) {
                matchedIds.add(n.id);
            }
        });
        
        const connectedIds = new Set(matchedIds);
        links.forEach(l => {
            const sId = typeof l.source === "object" ? l.source.id : l.source;
            const tId = typeof l.target === "object" ? l.target.id : l.target;
            if (matchedIds.has(sId)) connectedIds.add(tId);
            if (matchedIds.has(tId)) connectedIds.add(sId);
        });
        
        node.classed("dimmed", n => !connectedIds.has(n.id));
        link.classed("dimmed", l => {
            const sId = typeof l.source === "object" ? l.source.id : l.source;
            const tId = typeof l.target === "object" ? l.target.id : l.target;
            return !matchedIds.has(sId) && !matchedIds.has(tId);
        });
    });
    
    // 라벨 토글

    function toggleLabels() {

    // 시뮬레이션 틱

            .attr("y2", d => d.target.y);
        
        node.attr("transform", d => `translate(${d.x},${d.y})`);
    });
    
    // 드래그
    function dragstarted(event) { simulation.alphaTarget(0.3).restart(); }
    function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
    function dragended(event) { simulation.alphaTarget(0); d.fx = null; d.fy = null; }
    
    // 윈도우 리사이즈
    window.addEventListener("resize", () => {
        const w = window.innerWidth, h = window.innerHeight;
        svg.attr("width", w).attr("height", h);
        simulation.force("center", d3.forceCenter(w / 2, h / 2));
        simulation.alpha(0.3).restart();
    });
