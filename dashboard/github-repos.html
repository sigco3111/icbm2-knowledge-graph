<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 GitHub Repositories | ICBM2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#0a0e17;color:#e0e0e0;line-height:1.6;min-height:100vh}
a{color:#00ff88;text-decoration:none}
.page{max-width:1200px;margin:0 auto;padding:20px 16px 60px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:#667;font-size:.85em;margin-bottom:16px}
.back-link:hover{color:#00ff88}

/* Header */
.header{text-align:center;padding:24px 0 20px;border-bottom:1px solid #1a2332;margin-bottom:24px}
.header h1{font-size:1.8em;font-weight:700;background:linear-gradient(135deg,#00ff88,#00bbff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.header .subtitle{color:#667;font-size:.85em}
.profile-badge{display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:6px 16px;background:#111827;border:1px solid #1e293b;border-radius:20px;font-size:.82em;color:#aab}
.profile-badge img{width:24px;height:24px;border-radius:50%}
.profile-badge a{color:#00bbff}
.profile-badge a:hover{color:#00ff88}
.last-updated{color:#445;font-size:.75em;margin-top:8px}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:#111827;border-radius:12px;padding:16px;text-align:center;border:1px solid #1e293b}
.stat-value{font-size:1.8em;font-weight:800;letter-spacing:-1px}
.stat-label{font-size:.75em;color:#667;margin-top:4px}
.stat-card.green .stat-value{color:#00ff88}
.stat-card.blue .stat-value{color:#00bbff}
.stat-card.yellow .stat-value{color:#fbbf24}
.stat-card.red .stat-value{color:#f87171}
.stat-card.purple .stat-value{color:#a78bfa}
.stat-card.orange .stat-value{color:#fb923c}
.stat-card.cyan .stat-value{color:#22d3ee}

/* Charts */
.charts-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.chart-card{background:#111827;border-radius:12px;padding:16px;border:1px solid #1e293b}
.chart-title{font-size:.9em;font-weight:600;margin-bottom:12px;color:#aab}
.chart-card canvas{width:100%;height:auto}
.heatmap-card{grid-column:1/-1}
.heatmap-card canvas{height:120px}

/* Top Repos */
.top-section{margin-bottom:28px}
.top-title{font-size:1.05em;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.top-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.top-card{background:linear-gradient(135deg,#111827,#1a2332);border-radius:10px;padding:14px;border:1px solid #1e293b;cursor:pointer;transition:transform .2s,box-shadow .2s}
.top-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,255,136,.1);border-color:#00ff88}
.top-rank{font-size:1.3em;font-weight:800;color:#fbbf24;margin-bottom:2px}
.top-name{font-weight:600;font-size:.9em;color:#dde;margin-bottom:3px}
.top-desc{font-size:.78em;color:#778;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-stats{display:flex;gap:10px;font-size:.78em;color:#667;flex-wrap:wrap}

/* Controls */
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px}
.search-input{width:100%;padding:9px 14px;border-radius:10px;border:1px solid #1e293b;background:#111827;color:#dde;font-size:.85em;outline:none;transition:border-color .2s}
.search-input:focus{border-color:#00ff88}
.search-input::placeholder{color:#445}
.sort-select{padding:9px 12px;border-radius:10px;border:1px solid #1e293b;background:#111827;color:#dde;font-size:.85em;outline:none;cursor:pointer}
.sort-select:focus{border-color:#00ff88}
.vis-filters{display:flex;gap:6px}
.vis-btn{padding:6px 14px;border-radius:20px;border:1px solid #1e293b;background:#111827;color:#889;font-size:.8em;cursor:pointer;transition:all .2s}
.vis-btn:hover,.vis-btn.active{background:#1a2332;color:#00ff88;border-color:#00ff88}

/* Category Pills */
.cat-pills{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.cat-pill{padding:5px 12px;border-radius:16px;border:1px solid #1e293b;background:#111827;color:#889;font-size:.78em;cursor:pointer;transition:all .2s}
.cat-pill:hover,.cat-pill.active{background:#1a2332;color:#00bbff;border-color:#00bbff}
.cat-pill .pill-count{font-size:.7em;color:#556;margin-left:4px}

/* Repo Grid */
.repo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.repo-card{background:#111827;border-radius:12px;padding:16px 18px;transition:transform .2s,box-shadow .2s,border-color .2s;border:1px solid #1e293b;cursor:pointer;-webkit-tap-highlight-color:transparent}
.repo-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3);border-color:#00ff88}
.repo-card.stale{border-left:3px solid #fb923c}
.repo-card.stale:hover{border-color:#fbbf24;border-left-color:#fbbf24}
.repo-card.new-repo{border-left:3px solid #a78bfa}
.repo-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.repo-title{flex:1;min-width:0}
.repo-title a{font-weight:700;font-size:1em;color:#dde;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.repo-title a:hover{color:#00ff88}
.repo-badges{display:flex;gap:4px;flex-shrink:0;align-items:center}
.vis-badge{font-size:.62em;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.3px}
.vis-public{background:rgba(0,255,136,.1);color:#00ff88}
.vis-private{background:rgba(248,113,113,.1);color:#f87171}
.stale-badge{color:#fb923c;font-size:.82em}
.new-badge{color:#a78bfa;font-size:.68em;font-weight:700}
.repo-desc{font-size:.82em;color:#778;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.repo-meta{display:flex;align-items:center;gap:10px;font-size:.76em;color:#556;flex-wrap:wrap}
.repo-meta .lang{display:flex;align-items:center;gap:4px}
.repo-meta .lang-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.repo-meta .star,.repo-meta .fork,.repo-meta .issues{display:flex;align-items:center;gap:3px}
.repo-meta .date{margin-left:auto;font-size:.7em}
.repo-topics{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.topic-tag{font-size:.66em;padding:2px 8px;border-radius:10px;background:#1a2332;color:#667}
.commit-info{font-size:.7em;color:#556;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.repo-category-label{font-size:.66em;color:#556;background:#0d1117;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:6px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#0d1117;border-radius:16px;border:1px solid #1e293b;width:100%;max-width:700px;padding:28px;position:relative;animation:modalIn .2s ease-out}
@keyframes modalIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#667;font-size:1.4em;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s}
.modal-close:hover{background:#1e293b;color:#fff}
.modal-name{font-size:1.3em;font-weight:700;color:#dde;margin-bottom:4px}
.modal-desc{color:#889;font-size:.9em;margin-bottom:16px}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:.82em;font-weight:600;color:#aab;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.modal-meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.modal-meta-item{background:#111827;padding:10px 12px;border-radius:8px;border:1px solid #1e293b}
.modal-meta-label{font-size:.7em;color:#556}
.modal-meta-value{font-size:.95em;font-weight:600;color:#dde;margin-top:2px}
.modal-links{display:flex;gap:10px;margin-bottom:16px}
.modal-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:.85em;font-weight:500;transition:transform .15s}
.modal-link:hover{transform:translateY(-1px)}
.modal-link.github{background:rgba(0,255,136,.1);color:#00ff88;border:1px solid rgba(0,255,136,.2)}
.modal-link.demo{background:rgba(0,187,255,.1);color:#00bbff;border:1px solid rgba(0,187,255,.2)}
.modal-readme{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:14px;max-height:300px;overflow-y:auto;font-size:.82em;color:#99a;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.modal-readme .readme-placeholder{color:#445;font-style:italic}
.modal-commit{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:10px 14px;font-size:.82em}
.modal-commit .sha{color:#00ff88;font-family:monospace;font-weight:600}
.modal-commit .msg{color:#aab;margin-top:2px}
.modal-commit .date{color:#556;font-size:.75em;margin-top:2px}
.modal-topics{display:flex;gap:6px;flex-wrap:wrap}
.modal-topic{padding:4px 12px;border-radius:14px;background:#1a2332;color:#889;font-size:.78em;border:1px solid #1e293b}

/* No results */
.no-results{text-align:center;padding:40px;color:#445;font-size:.95em}

/* Legend */
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.72em;color:#889}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Responsive */
@media(max-width:1024px){
  .charts-row{grid-template-columns:repeat(2,1fr)}
  .heatmap-card{grid-column:1/-1}
}
@media(max-width:768px){
  .page{padding:12px 12px 40px}
  .header{padding:16px 0 14px}
  .header h1{font-size:1.4em}
  .charts-row{grid-template-columns:1fr}
  .heatmap-card{grid-column:auto}
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat-card{padding:12px 8px}
  .stat-value{font-size:1.5em}
  .stat-label{font-size:.68em}
  .top-grid{grid-template-columns:1fr 1fr}
  .top-card{padding:12px}
  .controls{gap:8px}
  .vis-filters{width:100%;justify-content:center}
  .sort-select{width:100%}
  .search-input{font-size:16px} /* Prevent iOS zoom */
  .cat-pills{gap:5px}
  .cat-pill{padding:4px 10px;font-size:.72em}
  .repo-grid{grid-template-columns:1fr;gap:10px}
  .repo-card{padding:14px 16px}
  .modal{padding:20px 16px;border-radius:12px}
  .modal-overlay{padding:20px 10px}
  .modal-name{font-size:1.1em}
  .modal-meta-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .modal-meta-item{padding:8px 10px}
  .modal-readme{max-height:250px;font-size:.78em}
  .modal-links{flex-wrap:wrap}
  .modal-link{padding:7px 14px;font-size:.82em}
}
@media(max-width:480px){
  .header h1{font-size:1.2em}
  .header .subtitle{font-size:.78em}
  .profile-badge{padding:5px 12px;font-size:.76em}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .stat-value{font-size:1.3em}
  .top-grid{grid-template-columns:1fr}
  .controls{flex-direction:column}
  .search-box{min-width:auto;width:100%}
  .sort-select{width:100%}
  .vis-filters{justify-content:flex-start}
  .repo-meta .date{margin-left:0;width:100%;margin-top:2px}
  .modal-meta-grid{grid-template-columns:repeat(2,1fr)}
}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#0a0e17}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#2e3f5b}
</style>
</head>

</div>

<div class="modal-overlay" id="modal-overlay">

    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

교 분석할 수 있습니다.\n-   **인터랙티브 차트**:\n    -   **시계열 추세 (Line Chart)**: 2000년부터 가장 최신 연도까지의 데이터 추세를 시각적으로 확인합니다.\n    -   **최신 데이터 비교 (Bar Chart)*","new_repo":false,"category":"📊 데이터 시각화"},{"name":"youtube-board","description":"YouTube 채널 분석 대시보드","url":"https://github.com/sigco3111/youtube-board","homepageUrl":"https://youtube-board.vercel.app","stargazerCount":0,"forkCount":1,"isPrivate":false,"createdAt":"2025-07-29T23:31:07Z","updatedAt":"2026-04-16T10:06:59Z","pushed_at":"2025-07-29T23:57:11Z","open_issues_count":0,"has_pages":false,"size":55,"visibility":"public","default_branch":"main","topics":[],"license_spdx_id":null,"language":"TypeScript","is_stale":true,"last_commit_sha":"cc16b2b","last_commit_msg":"API 키가 환경 변수에서 로드되었는지 여부를 추적하는 상태 변수를 추가하고, UI에서 환경 변수로 로드된 API 키를 삭제할 수 없도록 처리하였습니다. YouTube 및 Gemini API 키 입력 UI를 개선하여 환경 변수에서 로드된 경우에 대한 표시를 추가하였습니다.","last_commit_date":"2025-07-29T23:57:07Z","readme_preview":"# YouTube 채널 분석 대시보드 (YouTube Channel Analysis Dashboard)\n\n이 프로젝트는 YouTube 채널의 데이터를 시각화하고, Google Gemini AI를 활용하여 심층적인 분석 인사이트를 제공하는 웹 애플리케이션입니다. 사용자는 채널 ID, 핸들(@handle), 또는 URL을 입력하여 채널의 주요 지표, 동영상 성과, 예상 수익, 시청자 반응 등을 한눈에 파악할 수 있습니다.\n\n실행주소1 : https://youtube-board.vercel.app/\n\n실행주소2 : https://dev-canvas-pi.vercel.app/\n\n\n---\n\n## ✨ 주요 기능 (Key Features)\n\n*   **📈 종합 채널 대시보드**: 구독자 수, 총 조회수, 비디오 수를 직관적인 카드 형태로 제공합니다.\n*   **📊 동영상 성과 분석**: 기간별(전체, 7일, 30일, 90일) 및 정렬(최신순, 인기순)에 따른 동영상 목록과 조회수 차트를 시각화합","new_repo":false,"category":"📊 데이터 시각화"},{"name":"ai-image-generator","description":"AI 이미지 생성기 - 무료 이미지 생성 (Pollinations.ai + Next.js)","url":"https://github.com/sigco3111/ai-image-generator","homepageUrl":"https://ai-image-generator-beryl-sigma.vercel.app","stargazerCount":0,"forkCount":0,"isPrivate":false,"createdAt":"2026-04-16T06:41:13Z","updatedAt":"2026-04-16T07:44:13Z","pushed_at":"2026-04-16T07:44:09Z","open_issues_count":0,"has_pages":false,"size":85,"visibility":"public","default_branch":"main","topics":[],"license_spdx_id":null,"language":"TypeScript","is_stale":false,"last_commit_sha":"ebf44b6","last_commit_msg":"docs: update README to reflect new editorial design","last_commit_date":"2026-04-16T07:44:08Z","readme_preview":"# AI 이미지 생성기\n\n텍스트 프롬프트를 입력하면 AI가 이미지를 생성합니다. 비용 0원, 서버 없이 브라우저에서 동작.\n\nLive: https://ai-image-generator-beryl-sigma.vercel.app\n\n## 기능\n\n- 7가지 스타일 프리셋 (기본, 아이콘, 일러스트, 3D, 수채화, 픽셀아트, 실사)\n- 3가지 비율 선택 (1:1, 16:9, 9:16)\n- 다크모드 / 라이트모드 (시스템 설정 자동 감지)\n- 생성 히스토리 갤러리 (localStorage, 최대 50장)\n- 이미지 다운로드 및 전체화면 모달 뷰\n- 반응형 디자인 (모바일 + 데스크톱)\n\n## 기술 스택\n\n| 항목 | 기술 |\n|------|------|\n| 프레임워크 | Next.js 16 (App Router) |\n| 언어 | TypeScript |\n| 스타일링 | Tailwind CSS v4 |\n| 이미지 생성 | Pollinations.ai (FLUX 모델) |\n| 배포 | Vercel","new_repo":false,"category":"📋 기타"},{"name":"jiah_ai1","description":"gemini를 이용한 학습도우미","url":"https://github.com/sigco3111/jiah_ai1","homepageUrl":null,"stargazerCount":0,"forkCount":0,"isPrivate":true,"createdAt":"2025-03-18T22:38:59Z","updatedAt":"2025-03-18T22:46:54Z","pushed_at":"2025-03-18T22:39:00Z","open_issues_count":0,"has_pages":false,"size":0,"visibility":"private","default_branch":"main","topics":[],"license_spdx_id":null,"language":null,"is_stale":true,"last_commit_sha":null,"last_commit_msg":null,"last_commit_date":null,"readme_preview":null,"new_repo":false,"category":"📋 기타"},{"name":"bookk","description":"부크크용 스킬 및 작업 폴더","url":"https://github.com/sigco3111/bookk","homepageUrl":null,"stargazerCount":0,"forkCount":0,"isPrivate":true,"createdAt":"2026-03-29T23:04:39Z","updatedAt":"2026-04-16T01:52:18Z","pushed_at":"2026-04-16T01:52:14Z","open_issues_count":0,"has_pages":false,"size":261514,"visibility":"private","default_branch":"main","topics":[],"license_spdx_id":null,"language":"Python","is_stale":false,"last_commit_sha":"65b0120","last_commit_msg":"docs: README 파일 구조 트리 커넥터 수정, 물려받은 폐허 부크크등록가이드 추가","last_commit_date":"2026-04-16T01:52:12Z","readme_preview":"# bookk-publisher\n\n> 책 창작부터 부크크(bookk.co.kr) 출판까지 한 번에 끝내는 올인원 워크플로 스킬\n\n---\n\n## 개요\n\n이 프로젝트는 **6개의 Claude Code 스킬**과 **2개의 CLI 도구**를 제공한다. 각 스킬은 독립적으로 작동하며, 함께 사용하면 책 한 권을 처음부터 끝까지 만들고 부크크에 출판할 수 있다.\n\n| 스킬/도구 | 용도 | 트리거 예시 |\n|-----------|------|------------|\n| **bookk-publisher** | 책 창작→포맷팅→표지→메타데이터→출판 전체 워크플로 (사전 인터뷰 필수) | \"책 쓰고 싶다\", \"부크크에 출판하고 싶다\" |\n| **md2docx-bookk** | 마크다운 원고를 부크크 출판 서식 DOCX로 변환 + 품질 검증 | \"마크다운 DOCX로 변환해줘\", \"원고 포맷팅 해줘\" |\n| **bookk-add-toc** | 기존 DOCX에 목차(TOC, H1~3 제목) + 판권지 ","new_repo":false,"category":"📖 재무"},{"name":"upbit","description":"업비트 연동 도구","url":"https://github.com/sigco3111/upbit","homepageUrl":null,"stargazerCount":0,"forkCount":0,"isPrivate":true,"createdAt":"2022-04-12T07:10:23Z","updatedAt":"2026-04-16T10:09:14Z","pushed_at":"2022-04-12T07:30:02Z","open_issues_count":0,"has_pages":false,"size":9,"visibility":"private","default_branch":"master","topics":[],"license_spdx_id":null,"language":"Python","is_stale":true,"last_commit_sha":"b92e4ce","last_commit_msg":"first commnit","last_commit_date":"2022-04-12T07:23:43Z","readme_preview":null,"new_repo":false,"category":"📖 재무"},{"name":"ios_hyperclovax","description":"iOS 하이퍼클로박스 앱","url":"https://github.com/sigco3111/ios_hyperclovax","homepageUrl":null,"stargazerCount":0,"forkCount":0,"isPrivate":false,"createdAt":"2025-05-15T07:23:49Z","updatedAt":"2026-04-16T10:09:15Z","pushed_at":"2025-05-15T07:28:38Z","open_issues_count":0,"has_pages":false,"size":13,"visibility":"public","default_branch":"main","topics":[],"license_spdx_id":null,"language":"Swift","is_stale":true,"last_commit_sha":"d61446a","last_commit_msg":"README.md 파일 위치 변경: gemma3 폴더에서 루트 디렉토리로 이동","last_commit_date":"2025-05-15T07:28:33Z","readme_preview":"# HyperCLOVAX-SEED 프로젝트\n\n이 프로젝트는 HyperCLOVAX-SEED 모델을 사용하여 로컬 기기에서 대화형 AI를 실행하는 예제입니다.\n\n## 모델 준비 방법\n\n이 프로젝트에서는 `hyperclovax-seed-text-instruct-1.5b-q4_k_m.gguf` 모델을 사용합니다. 모델 파일을 준비하는 방법은 다음과 같습니다:\n\n### 1. HuggingFace에서 다운로드\n\nHuggingFace에서 직접 다운로드할 수 있습니다.\n\n테스트용 모델의 HuggingFace 저장소 주소:\n- https://huggingface.co/google/g pen_issues_count":0,"has_pages":false,"size":1635,"visibility":"private","default_branch":"main","topics":[],"license_spdx_id":null,"language":"Python","is_stale":false,"last_commit_sha":"6b37616","last_commit_msg":"feat: ICBM2 주간 자기 개선 리포트 시스템","last_commit_date":"2026-04-06T06:48:13Z","readme_preview":"# ICBM2호 워크스페이스\n\nICBM2호의 설정, 아이덴티티, 기억, 스킬, 프로젝트를 관리하는 중앙 저장소입니다.\n\n## 📁 디렉토리 구조\n\n```\nworkspace/\n├── 📄 핵심 설정 (루트)\n│   ├── AGENTS.md           # 에이전트 관리 규칙\n│   ├── IDENTITY.md         # ICBM2호의 이름, 생명체\n│   ├── SOUL.md             # 핵심 진리, 경계선, 관계\n│   ├── USER.md             # 주인님에 대한 정보\n│   ├── TOOLS.md            # 로컬 노트 (카메라, SSH 등)\n│   ├── HEARTBEAT.md        # 하트비트 체크리스트\n│   └── MEMORY.md           # 장기 기억\n│\n├── 📂 games/               # 게임 자동화 (아카이브)\n│   ├── grindquest_SKILL.md     # 부주요원 API ","new_repo":false,"category":"🔧 ICBM/에이전트"},{"name":"ubob_a2a","description":"UBOB A2A 프로토콜 학습 어시스턴트 에코시스템","url":"https://github.com/sigco3111/ubob_a2a","homepageUrl":null,"stargazerCount":0,"forkCount":0,"isPrivate":true,"createdAt":"2025-04-22T04:03:02Z","updatedAt":"2026-04-16T10:09:12Z","pushed_at":"2025-04-24T05:27:17Z","open_issues_count":0,"has_pages":false,"size":4119,"visibility":"private","default_branch":"main","topics":[],"license_spdx_id":null,"language":"Python","is_stale":true,"last_commit_sha":"51aad2c","last_commit_msg":"수정: recommendation_agent와 content_search_agent에서 model_copy 처리 로직 개선","last_commit_date":"2025-04-24T05:26:45Z","readme_preview":"# UBOB 학습 어시스턴트 에코시스템\n\nGoogle ADK(Agent Development Kit)와 A2A(Agent-to-Agent) 프로토콜을 활용한 UBOB Pro 학습 어시스턴트 에코시스템입니다.\n\n## 개요\n\n이 프로젝트는 Google의 ADK와 A2A 프로토콜을 활용하여 기존 UBOB Pro MCP(Model Context Protocol) 기능을 확장한 통합 에이전트 서비스입니다. 각 기능에 특화된 여러 AI 에이전트가 협업하여 학습자에게 종합적인 학습 지원을 제공합니다.\n\n현재 구현된 에이전트:\n- **콘텐츠 검색 에이전트**: UBOB 콘텐츠 데이터베이스에서 최적의 학습 자료를 검색\n\n## 주요 기능\n\n### 콘텐츠 검색 에이전트\n\n- 키워드, 카테고리, 강사 등 조건별 검색\n- 검색 결과 순위화 및 필터링\n- 과정 상세 정보 요약 제공\n- 인기 검색어 및 최근 검색 이력 활용\n\n## 기술 스택\n\n- **언어**: Pytho REPOS.forEach(r => { const l = r.language || 'N/A'; langs[l] = (langs[l]||0) + 1; });
const topLang = Object.entries(langs).sort((a,b) => b[1]-a[1])[0];
const staleCount = REPOS.filter(r => r.is_stale).length;

document.getElementById('stats').innerHTML = [
  {v:totalRepos,l:'총 저장소',c:'green'},
  {v:publicRepos,l:'공개',c:'blue'},
  {v:privateRepos,l:'비공개',c:'red'},
  {v:totalStars,l:'⭐ Stars',c:'yellow'},
  {v:totalForks,l:'🍴 Forks',c:'purple'},
  {v:totalIssues,l:'Open Issues',c:'cyan'},
  {v:topLang?topLang[0]:'-',l:'주력 언어 ('+(topLang?topLang[1]:0)+')',c:'orange'}
].map(s => `<div class="stat-card ${s.c}"><div class="stat-value">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('');

// ─── Top Repos ───
const topRepos = [...REPOS].filter(r => (r.stargazerCount||0) > 0 || (r.forkCount||0) >= 2)

document.getElementById('top-repos').innerHTML = topRepos.length ? topRepos.map((r,i) => `
  <div class="top-card" onclick="showModal('${r.name}')">

`).join('') : '<div class="no-results">인기 저장소 없음</div>';

// ─── Category Pills ───
const CATS = {};
REPOS.forEach(r => { CATS[r.category] = (CATS[r.category]||0) + 1; });
const catOrder = ['전체', ...Object.keys(CATS).sort()];
const pillsEl = document.getElementById('cat-pills');
pillsEl.innerHTML = catOrder.map(c => {
  const cnt = c === '전체' ? totalRepos : (CATS[c]||0);
  return `<button class="cat-pill${c==='전체'?' active':''}" data-cat="${c}">${c}<span class="pill-count">${cnt}</span></button>`;
}).join('');

pillsEl.addEventListener('click', e => {
  if (!e.target.classList.contains('cat-pill')) return;
  pillsEl.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentCat = e.target.dataset.cat;

});

// ─── Visibility Filter ───
document.querySelectorAll('.vis-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.vis-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentVis = btn.dataset.vis;
    renderRepos();

// ─── Sort ───
document.getElementById('sort').addEventListener('change', e => {
  currentSort = e.target.value;
  renderRepos();
});

// ─── Search ───
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase();
  renderRepos();
});

// ─── Render ───
function renderRepos() {
  let filtered = REPOS.filter(r => {
    if (currentCat !== '전체' && r.category !== currentCat) return false;
    if (currentVis === 'public' && r.isPrivate) return false;
    if (currentVis === 'private' && !r.isPrivate) return false;
    if (currentSearch) {
      const t = (r.name + ' ' + (r.description||'') + ' ' + (r.language||'') + ' ' + (r.topics||[]).join(' ')).toLowerCase();
      if (!t.includes(currentSearch)) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a,b) => {
    switch(currentSort) {
      case 'stars': return (b.stargazerCount||0) - (a.stargazerCount||0);
      case 'forks': return (b.forkCount||0) - (a.forkCount||0);
      case 'updated': return new Date(b.pushed_at||b.updatedAt||0) - new Date(a.pushed_at||a.updatedAt||0);
      default: return a.name.localeCompare(b.name);
    }
  });

  const grid = document.getElementById('repo-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">검색 결과가 없습니다</div>';
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const lang = r.language || 'N/A';
    const date = r.pushed_at ? new Date(r.pushed_at).toLocaleDateString('ko-KR') : (r.updatedAt ? new Date(r.updatedAt).toLocaleDateString('ko-KR') : '');
    const classes = ['repo-card'];
    if (r.is_stale) classes.push('stale');
    if (r.new_repo) classes.push('new-repo');
    const topics = (r.topics||[]).slice(0,3).map(t => `<span class="topic-tag">${t}</span>`).join('');
    const commitLine = r.last_commit_msg ? `<div class="commit-info"><span style="color:#00ff88;font-family:monospace">${r.last_commit_sha||''}</span> ${escHtml(r.last_commit_msg)}</div>` : '';

    return `<div class="${classes.join(' ')}" onclick="showModal('${r.name}')">
      <div class="repo-card-header">
        <div class="repo-title"><a href="${r.url}" target="_blank" onclick="event.stopPropagation()">${escHtml(r.name)}</a></div>
        <div class="repo-badges">
          <span class="vis-badge ${r.isPrivate?'vis-private':'vis-public'}">${r.isPrivate?'Private':'Public'}</span>
          ${r.new_repo ? '<span class="new-badge">🆕</span>' : ''}
          ${r.is_stale ? '<span class="stale-badge">⚠️</span>' : ''}
        </div>
      </div>
      ${r.description ? `<div class="repo-desc">${escHtml(r.description)}</div>` : ''}
      <div class="repo-meta">
        <span class="lang"><span class="lang-dot" style="background:${LANG_COLORS[lang]||'#555'}"></span>${lang}</span>
        ${(r.stargazerCount||0) ? `<span class="star">⭐${r.stargazerCount}</span>` : ''}
        ${(r.forkCount||0) ? `<span class="fork">🍴${r.forkCount}</span>` : ''}
        ${(r.open_issues_count||0) ? `<span class="issues">🐛${r.open_issues_count}</span>` : ''}
        <span class="date">${date}</span>
      </div>
      ${topics ? `<div class="repo-topics">${topics}</div>` : ''}
      ${commitLine}
      <span class="repo-category-label">${r.category}</span>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Modal ───
function showModal(name) {
  const r = REPOS.find(x => x.name === name);

  const lang = r.language || 'N/A';

  const readmeHtml = r.readme_preview
    ? `<pre class="modal-readme">${escHtml(r.readme_preview)}${r.readme_preview.length >= 500 ? '\n...' : ''}</pre>`
    : `<div class="modal-readme"><span class="readme-placeholder">README를 사용할 수 없습니다</span></div>`;

  const commitHtml = r.last_commit_sha
    ? `<div class="modal-commit">

    <div class="modal-section">

      <div class="modal-meta-grid">
        <div class="modal-meta-item"><div class="modal-meta-label">언어</div><div class="modal-meta-value" style="color:${LANG_COLORS[lang]||'#dde'}">${lang}</div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">⭐ Stars</div><div class="modal-meta-value">${r.stargazerCount||0}</div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">🍴 Forks</div><div class="modal-meta-value">${r.forkCount||0}</div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">🐛 Issues</div><div class="modal-meta-value">${r.open_issues_count||0}</div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">📦 Size</div><div class="modal-meta-value">${sizeStr}</div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">📄 License</div><div class="modal-meta-value">${r.license_spdx_id || 'N/A'}</div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">🌿 Branch</div><div class="modal-meta-value">${r.default_branch || 'main'}</div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">📂 Category</div><div class="modal-meta-value">${r.category}</div></div>

    </div>

function closeModal() {

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {

});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─── Charts ───
function setupCanvas(id) {
  const canvas = document.getElementById(id);
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 32;
  canvas.style.width = w + 'px';
  canvas.width = w * dpr;
  canvas.height = (id === 'heatmap' ? 140 : 220) * dpr;
  canvas.style.height = (id === 'heatmap' ? 140 : 220) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w, h: id === 'heatmap' ? 140 : 220 };
}

// Donut Chart - Language Distribution
function drawLangChart() {
  const { ctx, w, h } = setupCanvas('langChart');
  ctx.clearRect(0, 0, w, h);

  const sorted = Object.entries(langs).sort((a,b) => b[1]-a[1]);
  const total = sorted.reduce((s,[,v]) => s+v, 0);
  if (total === 0) return;

  const cx = w / 2;
  const cy = h / 2 - 5;
  const outerR = Math.min(cx, cy) - 10;
  const innerR = outerR * 0.55;
  let angle = -Math.PI / 2;

  const legendEl = document.getElementById('langLegend');
  legendEl.innerHTML = '';

  sorted.forEach(([name, count], i) => {
    const slice = (count / total) * Math.PI * 2;
    const color = LANG_COLORS[name] || CHART_COLORS[i % CHART_COLORS.length];

    ctx.beginPath();
    ctx.arc(cx, cy, outerR, angle, angle + slice);
    ctx.arc(cx, cy, innerR, angle + slice, angle, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // Label if slice is big enough
    const pct = ((count / total) * 100).toFixed(1);
    if (pct >= 3) {
      const midAngle = angle + slice / 2;
      const labelR = (outerR + innerR) / 2;
      const lx = cx + Math.cos(midAngle) * labelR;
      const ly = cy + Math.sin(midAngle) * labelR;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pct + '%', lx, ly);
    }

    angle += slice;

    // Legend
    legendEl.innerHTML += `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${name} (${count})</div>`;
  });

  // Center text
  ctx.fillStyle = '#dde';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(sorted.length, cx, cy - 6);
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#667';
  ctx.fillText('languages', cx, cy + 12);
}

// Bar Chart - Monthly Creation Trend
function drawMonthChart() {
  const { ctx, w, h } = setupCanvas('monthChart');
  ctx.clearRect(0, 0, w, h);

  const months = {};
  REPOS.forEach(r => {
    if (r.createdAt) {
      const m = r.createdAt.substring(0, 7); // YYYY-MM
      months[m] = (months[m]||0) + 1;
    }
  });

  const sorted = Object.entries(months).sort((a,b) => a[0].localeCompare(b[0])).slice(-12);
  if (sorted.length === 0) return;

  const maxVal = Math.max(...sorted.map(([,v]) => v));
  const padding = { top: 10, right: 10, bottom: 30, left: 35 };
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;
  const barW = chartW / sorted.length - 4;

  // Y axis
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  for (let i = 0; i <= maxVal; i++) {
    const y = padding.top + chartH - (i / maxVal) * chartH;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(w - padding.right, y);
    ctx.stroke();
    ctx.fillStyle = '#445';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(i, padding.left - 6, y);
  }

  sorted.forEach(([month, count], i) => {
    const barH = (count / maxVal) * chartH;
    const x = padding.left + i * (chartW / sorted.length) + 2;
    const y = padding.top + chartH - barH;

    const grad = ctx.createLinearGradient(x, y, x, padding.top + chartH);
    grad.addColorStop(0, '#00ff88');
    grad.addColorStop(1, 'rgba(0,255,136,0.2)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, [3, 3, 0, 0]);
    ctx.fill();

    // Value on top
    if (count > 0) {
      ctx.fillStyle = '#aab';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(count, x + barW/2, y - 6);
    }

    // X label
    ctx.fillStyle = '#556';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(month.substring(5), x + barW/2, padding.top + chartH + 16);
  });
}

// Horizontal Bar Chart - Category Distribution
function drawCatChart() {
  const { ctx, w, h } = setupCanvas('catChart');
  ctx.clearRect(0, 0, w, h);

  const sorted = Object.entries(CATS).sort((a,b) => b[1]-a[1]);
  if (sorted.length === 0) return;

  const maxVal = Math.max(...sorted.map(([,v]) => v));
  const padding = { top: 5, right: 40, bottom: 5, left: 10 };
  const chartH = h - padding.top - padding.bottom;
  const barH = Math.min(20, (chartH / sorted.length) - 3);
  const labelW = 0; // We use short labels

  sorted.forEach(([cat, count], i) => {
    const y = padding.top + i * (barH + 3);
    const maxBarW = w - padding.left - padding.right - 10;
    const barW = (count / maxVal) * maxBarW;
    const color = CHART_COLORS[i % CHART_COLORS.length];

    const grad = ctx.createLinearGradient(padding.left, y, padding.left + barW, y);
    grad.addColorStop(0, color);
    grad.addColorStop(1, color + '44');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(padding.left, y, barW, barH, 3);
    ctx.fill();

    // Count
    ctx.fillStyle = '#aab';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${count}`, padding.left + barW + 6, y + barH/2);

    // Category name (truncated)
    const shortName = cat.replace(/^[^\s]+ /, '').substring(0, 10);
    ctx.fillStyle = '#778';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(cat, padding.left - 4, y + barH/2);
  });
}

// Heatmap - Activity
function drawHeatmap() {
  const { ctx, w, h } = setupCanvas('heatmap');
  ctx.clearRect(0, 0, w, h);

  const now = new Date();
  const weeks = 52;
  const cellSize = Math.max(8, Math.floor((w - 40) / weeks));
  const gap = 2;
  const startX = 30;

  // Build activity map from pushed_at
  const activity = {};
  REPOS.forEach(r => {
    if (r.pushed_at) {
      const d = new Date(r.pushed_at);
      const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
      const yearAgo = new Date(now);
      yearAgo.setDate(yearAgo.getDate() - 365);
      if (d >= yearAgo) {
        const daysAgo = Math.floor((now - d) / 86400000);
        const weekIdx = Math.floor(daysAgo / 7);
        const dayIdx = daysAgo % 7;
        const key = weekIdx + ',' + dayIdx;
        activity[key] = (activity[key]||0) + 1;
      }
    }
  });

  // Day labels
  const dayLabels = ['', 'Mon', '', 'Wed', '', 'Fri', ''];
  for (let d = 0; d < 7; d++) {
    ctx.fillStyle = '#445';
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(dayLabels[d], startX - 4, d * (cellSize + gap) + cellSize/2);
  }

  const maxAct = Math.max(1, ...Object.values(activity));

  for (let wk = 0; wk < weeks; wk++) {
    for (let d = 0; d < 7; d++) {
      const key = wk + ',' + d;
      const val = activity[key] || 0;
      let alpha = 0.05;
      if (val > 0) alpha = 0.2 + (val / maxAct) * 0.8;

      ctx.fillStyle = `rgba(0,255,136,${alpha})`;
      ctx.beginPath();
      ctx.roundRect(startX + wk * (cellSize + gap), d * (cellSize + gap), cellSize, cellSize, 2);
      ctx.fill();
    }
  }

  // Legend
  const legX = startX + weeks * (cellSize + gap) + 10;
  const legY = 10;
  ctx.fillStyle = '#556';
  ctx.font = '8px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Less', legX, legY);
  for (let i = 0; i < 5; i++) {
    const a = i === 0 ? 0.05 : 0.2 + (i / 4) * 0.8;
    ctx.fillStyle = `rgba(0,255,136,${a})`;
    ctx.beginPath();
    ctx.roundRect(legX + 25 + i * 12, legY - 6, 10, 10, 2);
    ctx.fill();
  }
  ctx.fillStyle = '#556';
  ctx.fillText('More', legX + 90, legY);
}

// ─── Draw all charts ───
function drawAllCharts() {
  drawLangChart();
  drawMonthChart();
  drawCatChart();
  drawHeatmap();
}

// ─── Init ───
window.addEventListener('load', () => {

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = Array.isArray(radii) ? radii[0] : (radii || 0);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}
